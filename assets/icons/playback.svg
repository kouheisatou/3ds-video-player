<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- TV/monitor case with raised bevel -->
  <rect x="1" y="2" width="14" height="11" fill="#c0c0c0"/>
  <rect x="1" y="2" width="14" height="1" fill="#ffffff"/>
  <rect x="1" y="2" width="1" height="11" fill="#ffffff"/>
  <rect x="14" y="2" width="1" height="11" fill="#000000"/>
  <rect x="1" y="12" width="14" height="1" fill="#000000"/>
  <!-- Screen (sunken) -->
  <rect x="3" y="4" width="10" height="7" fill="#000080"/>
  <rect x="3" y="4" width="10" height="1" fill="#000000"/>
  <rect x="3" y="4" width="1" height="7" fill="#000000"/>
  <!-- Play triangle on screen -->
  <polygon points="6,6 6,9 10,7.5" fill="#ffff00"/>
  <!-- Stand -->
  <rect x="5" y="13" width="6" height="1" fill="#808080"/>
  <rect x="6" y="14" width="4" height="1" fill="#000000"/>
</svg>
