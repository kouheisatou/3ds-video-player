<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Pencil from bottom-left to top-right -->
  <!-- Tip (graphite point) -->
  <polygon points="1,15 3,15 3,13" fill="#000000"/>
  <!-- Wood ferrule (lighter triangle) -->
  <polygon points="3,13 3,15 5,15 5,11" fill="#ffe080"/>
  <polygon points="3,13 5,11 5,13 3,15" fill="#c08040"/>
  <!-- Yellow shaft -->
  <polygon points="5,11 5,15 11,9 11,5" fill="#ffe040"/>
  <!-- Top edge highlight -->
  <polygon points="5,11 11,5 12,6 6,12" fill="#ffffff"/>
  <!-- Bottom edge shadow -->
  <polygon points="5,15 11,9 12,10 6,16" fill="#c0a000"/>
  <!-- Pink eraser -->
  <polygon points="11,5 13,3 15,5 13,7" fill="#ff80a0"/>
  <polygon points="11,5 13,3 14,4 12,6" fill="#ffb0c0"/>
  <!-- Metal ferrule connector -->
  <polygon points="11,5 12,4 14,6 13,7" fill="#a0a0a0"/>
  <!-- Outline -->
  <polygon points="1,15 3,13 11,5 13,3 15,5 13,7 5,15" fill="none" stroke="#000000" stroke-width="0.5"/>
</svg>
