<svg xmlns="http://www.w3.org/2000/svg" width="16" height="14" viewBox="0 0 16 14" shape-rendering="crispEdges">
  <!-- Restore: two overlapping window rectangles -->
  <!-- back window (top-right) -->
  <rect x="5" y="1" width="9" height="8" fill="none" stroke="#000" stroke-width="1"/>
  <rect x="5" y="2" width="9" height="1" fill="#000"/>
  <!-- front window (bottom-left), white fill to cover back -->
  <rect x="2" y="4" width="9" height="8" fill="#fff" stroke="#000" stroke-width="1"/>
  <rect x="2" y="5" width="9" height="1" fill="#000"/>
</svg>
