<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Simple grey isometric cube -->
  <!-- Top face (lightest) -->
  <polygon points="8,2 14,5 8,8 2,5" fill="#dcdcdc"/>
  <!-- Left face (medium) -->
  <polygon points="2,5 8,8 8,14 2,11" fill="#909090"/>
  <!-- Right face (darker) -->
  <polygon points="14,5 14,11 8,14 8,8" fill="#b4b4b4"/>
  <!-- Edge outlines -->
  <polygon points="8,2 14,5 8,8 2,5" fill="none" stroke="#000000" stroke-width="0.6"/>
  <polygon points="2,5 8,8 8,14 2,11" fill="none" stroke="#000000" stroke-width="0.6"/>
  <polygon points="14,5 14,11 8,14 8,8" fill="none" stroke="#000000" stroke-width="0.6"/>
</svg>
