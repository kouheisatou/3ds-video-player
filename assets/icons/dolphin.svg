<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" shape-rendering="crispEdges">
  <!-- Background bubble shadow -->
  <rect x="6" y="38" width="36" height="2" fill="#a0c0d8"/>
  <!-- Tail fin -->
  <polygon points="2,18 8,22 8,28 2,32 6,25" fill="#3a5a78"/>
  <polygon points="3,20 8,23 8,27 3,30" fill="#5a7898"/>
  <!-- Body (main rounded shape) -->
  <rect x="8" y="22" width="2" height="8" fill="#5a7898"/>
  <rect x="10" y="20" width="2" height="12" fill="#5a7898"/>
  <rect x="12" y="18" width="2" height="14" fill="#5a7898"/>
  <rect x="14" y="16" width="2" height="16" fill="#5a7898"/>
  <rect x="16" y="14" width="14" height="20" fill="#5a7898"/>
  <rect x="30" y="14" width="2" height="20" fill="#5a7898"/>
  <rect x="32" y="16" width="2" height="18" fill="#5a7898"/>
  <rect x="34" y="18" width="2" height="14" fill="#5a7898"/>
  <rect x="36" y="20" width="2" height="10" fill="#5a7898"/>
  <rect x="38" y="22" width="2" height="6" fill="#5a7898"/>
  <!-- Top dorsal fin -->
  <polygon points="22,14 28,14 26,8 24,8" fill="#3a5a78"/>
  <polygon points="23,13 27,13 26,9 24,9" fill="#5a7898"/>
  <!-- Top highlight (lighter) -->
  <rect x="16" y="14" width="14" height="2" fill="#80a0c0"/>
  <rect x="14" y="16" width="2" height="2" fill="#80a0c0"/>
  <rect x="30" y="16" width="2" height="2" fill="#80a0c0"/>
  <!-- White belly -->
  <rect x="12" y="28" width="20" height="4" fill="#ffffff"/>
  <rect x="14" y="32" width="16" height="2" fill="#ffffff"/>
  <rect x="16" y="34" width="12" height="1" fill="#ffffff"/>
  <!-- Belly edge shadow -->
  <rect x="12" y="27" width="20" height="1" fill="#d0d8e0"/>
  <!-- Nose / beak -->
  <rect x="40" y="22" width="2" height="4" fill="#5a7898"/>
  <rect x="42" y="23" width="2" height="3" fill="#5a7898"/>
  <rect x="44" y="24" width="1" height="2" fill="#5a7898"/>
  <!-- Mouth line -->
  <rect x="38" y="26" width="6" height="1" fill="#000000"/>
  <!-- Eye -->
  <rect x="33" y="20" width="3" height="3" fill="#ffffff"/>
  <rect x="34" y="21" width="2" height="2" fill="#000000"/>
  <rect x="34" y="21" width="1" height="1" fill="#ffffff"/>
  <!-- Pectoral fin -->
  <polygon points="20,30 24,30 24,36 18,34" fill="#3a5a78"/>
  <polygon points="20,30 24,30 24,33 20,32" fill="#5a7898"/>
  <!-- Outline (dark edge) -->
  <rect x="14" y="14" width="2" height="1" fill="#2a4060"/>
  <rect x="30" y="14" width="2" height="1" fill="#2a4060"/>
  <rect x="12" y="16" width="2" height="1" fill="#2a4060"/>
  <rect x="32" y="16" width="2" height="1" fill="#2a4060"/>
  <rect x="10" y="18" width="2" height="1" fill="#2a4060"/>
  <rect x="34" y="18" width="2" height="1" fill="#2a4060"/>
  <rect x="8" y="20" width="2" height="1" fill="#2a4060"/>
  <rect x="36" y="20" width="2" height="1" fill="#2a4060"/>
</svg>
