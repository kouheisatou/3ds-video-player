<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" shape-rendering="crispEdges">
  <!-- ===== Kairu the dolphin (Office Assistant style) ===== -->
  <!-- Body color palette: bright cyan-blue, light highlight, dark shadow -->

  <!-- Tail (back fin) - left side -->
  <polygon points="1,18 6,21 6,28 1,32 4,25" fill="#0a4a7a"/>
  <polygon points="3,20 6,22 6,27 3,30 5,25" fill="#1e7ac0"/>

  <!-- Body (curved leaping pose) -->
  <!-- Outer outline (darker blue) -->
  <rect x="6" y="20" width="2" height="9" fill="#0a4a7a"/>
  <rect x="8" y="18" width="2" height="11" fill="#0a4a7a"/>
  <rect x="10" y="16" width="2" height="13" fill="#0a4a7a"/>
  <rect x="12" y="14" width="2" height="13" fill="#0a4a7a"/>
  <rect x="14" y="13" width="2" height="13" fill="#0a4a7a"/>
  <rect x="16" y="12" width="2" height="13" fill="#0a4a7a"/>
  <rect x="18" y="11" width="2" height="13" fill="#0a4a7a"/>
  <rect x="20" y="10" width="2" height="14" fill="#0a4a7a"/>
  <rect x="22" y="9"  width="2" height="14" fill="#0a4a7a"/>
  <rect x="24" y="8"  width="2" height="14" fill="#0a4a7a"/>
  <rect x="26" y="7"  width="2" height="13" fill="#0a4a7a"/>
  <rect x="28" y="7"  width="2" height="12" fill="#0a4a7a"/>
  <rect x="30" y="8"  width="2" height="11" fill="#0a4a7a"/>
  <rect x="32" y="10" width="2" height="9"  fill="#0a4a7a"/>
  <rect x="34" y="12" width="2" height="7"  fill="#0a4a7a"/>
  <rect x="36" y="14" width="2" height="5"  fill="#0a4a7a"/>
  <rect x="38" y="16" width="2" height="3"  fill="#0a4a7a"/>

  <!-- Body main fill (bright blue) -->
  <rect x="8"  y="21" width="2" height="6" fill="#1e7ac0"/>
  <rect x="10" y="18" width="2" height="9" fill="#1e7ac0"/>
  <rect x="12" y="16" width="2" height="10" fill="#1e7ac0"/>
  <rect x="14" y="15" width="2" height="10" fill="#1e7ac0"/>
  <rect x="16" y="14" width="2" height="10" fill="#1e7ac0"/>
  <rect x="18" y="13" width="2" height="10" fill="#1e7ac0"/>
  <rect x="20" y="12" width="2" height="10" fill="#1e7ac0"/>
  <rect x="22" y="11" width="2" height="11" fill="#1e7ac0"/>
  <rect x="24" y="10" width="2" height="11" fill="#1e7ac0"/>
  <rect x="26" y="9"  width="2" height="10" fill="#1e7ac0"/>
  <rect x="28" y="9"  width="2" height="9"  fill="#1e7ac0"/>
  <rect x="30" y="10" width="2" height="8"  fill="#1e7ac0"/>
  <rect x="32" y="12" width="2" height="6"  fill="#1e7ac0"/>
  <rect x="34" y="14" width="2" height="4"  fill="#1e7ac0"/>
  <rect x="36" y="16" width="2" height="2"  fill="#1e7ac0"/>

  <!-- Top highlight (lighter cyan) -->
  <rect x="14" y="14" width="2" height="1" fill="#5cc0f0"/>
  <rect x="16" y="13" width="2" height="1" fill="#5cc0f0"/>
  <rect x="18" y="12" width="2" height="1" fill="#5cc0f0"/>
  <rect x="20" y="11" width="2" height="1" fill="#5cc0f0"/>
  <rect x="22" y="10" width="2" height="1" fill="#5cc0f0"/>
  <rect x="24" y="9"  width="2" height="1" fill="#5cc0f0"/>
  <rect x="26" y="8"  width="2" height="1" fill="#5cc0f0"/>
  <rect x="28" y="8"  width="2" height="1" fill="#5cc0f0"/>
  <rect x="30" y="9"  width="2" height="1" fill="#5cc0f0"/>
  <rect x="32" y="11" width="2" height="1" fill="#5cc0f0"/>

  <!-- Dorsal fin (top) -->
  <polygon points="22,12 28,12 26,3 24,3" fill="#0a4a7a"/>
  <polygon points="23,11 27,11 26,4 24,4" fill="#1e7ac0"/>
  <polygon points="24,10 26,10 25,5" fill="#5cc0f0"/>

  <!-- White belly (lower curve) -->
  <rect x="10" y="27" width="2" height="2" fill="#ffffff"/>
  <rect x="12" y="26" width="2" height="3" fill="#ffffff"/>
  <rect x="14" y="25" width="2" height="3" fill="#ffffff"/>
  <rect x="16" y="24" width="2" height="3" fill="#ffffff"/>
  <rect x="18" y="23" width="2" height="3" fill="#ffffff"/>
  <rect x="20" y="22" width="2" height="3" fill="#ffffff"/>
  <rect x="22" y="22" width="2" height="3" fill="#ffffff"/>
  <rect x="24" y="21" width="2" height="3" fill="#ffffff"/>
  <rect x="26" y="19" width="2" height="3" fill="#ffffff"/>
  <rect x="28" y="18" width="2" height="3" fill="#ffffff"/>
  <rect x="30" y="18" width="2" height="2" fill="#ffffff"/>
  <rect x="32" y="18" width="2" height="2" fill="#ffffff"/>
  <rect x="34" y="18" width="2" height="2" fill="#ffffff"/>

  <!-- Belly shading (faint grey edge) -->
  <rect x="10" y="29" width="2" height="1" fill="#c0d0d8"/>
  <rect x="12" y="29" width="2" height="1" fill="#c0d0d8"/>
  <rect x="14" y="28" width="2" height="1" fill="#c0d0d8"/>
  <rect x="16" y="27" width="2" height="1" fill="#c0d0d8"/>
  <rect x="18" y="26" width="2" height="1" fill="#c0d0d8"/>
  <rect x="20" y="25" width="2" height="1" fill="#c0d0d8"/>
  <rect x="22" y="25" width="2" height="1" fill="#c0d0d8"/>
  <rect x="24" y="24" width="2" height="1" fill="#c0d0d8"/>

  <!-- Nose / beak (forward) -->
  <rect x="38" y="18" width="2" height="2" fill="#1e7ac0"/>
  <rect x="40" y="18" width="2" height="2" fill="#1e7ac0"/>
  <rect x="38" y="20" width="2" height="1" fill="#0a4a7a"/>
  <rect x="40" y="20" width="2" height="1" fill="#0a4a7a"/>
  <!-- Belly continues to nose underside -->
  <rect x="36" y="20" width="2" height="1" fill="#ffffff"/>

  <!-- Smile / mouth line -->
  <rect x="36" y="21" width="6" height="1" fill="#000000"/>

  <!-- Eye -->
  <rect x="31" y="13" width="4" height="4" fill="#ffffff"/>
  <rect x="32" y="14" width="3" height="3" fill="#000000"/>
  <rect x="32" y="14" width="1" height="1" fill="#ffffff"/>

  <!-- Pectoral fin (front side, extends down) -->
  <polygon points="18,24 24,24 24,32 16,30" fill="#0a4a7a"/>
  <polygon points="19,24 23,24 23,30 18,29" fill="#1e7ac0"/>
  <polygon points="20,24 22,24 22,27" fill="#5cc0f0"/>
</svg>
