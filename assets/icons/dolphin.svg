<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 24" shape-rendering="crispEdges">
  <!-- ===== Pixel penguin v4 — rounded bottom, distinct wing step ===== -->

  <!-- Black silhouette -->
  <rect x="9"  y="2"  width="4"  height="1" fill="#000000"/>
  <rect x="8"  y="3"  width="6"  height="1" fill="#000000"/>
  <rect x="7"  y="4"  width="8"  height="1" fill="#000000"/>
  <rect x="6"  y="5"  width="9"  height="1" fill="#000000"/>
  <rect x="6"  y="6"  width="9"  height="1" fill="#000000"/>
  <rect x="6"  y="7"  width="9"  height="1" fill="#000000"/>
  <rect x="5"  y="8"  width="10" height="1" fill="#000000"/>
  <rect x="5"  y="9"  width="10" height="1" fill="#000000"/>
  <rect x="4"  y="10" width="11" height="1" fill="#000000"/>
  <rect x="4"  y="11" width="11" height="1" fill="#000000"/>
  <rect x="4"  y="12" width="11" height="1" fill="#000000"/>
  <rect x="4"  y="13" width="11" height="1" fill="#000000"/>
  <rect x="5"  y="14" width="10" height="1" fill="#000000"/>
  <rect x="5"  y="15" width="10" height="1" fill="#000000"/>
  <rect x="6"  y="16" width="9"  height="1" fill="#000000"/>
  <rect x="7"  y="17" width="7"  height="1" fill="#000000"/>

  <!-- White face/belly — teardrop, biased right -->
  <rect x="10" y="4"  width="3"  height="1" fill="#ffffff"/>
  <rect x="9"  y="5"  width="5"  height="1" fill="#ffffff"/>
  <rect x="9"  y="6"  width="5"  height="1" fill="#ffffff"/>
  <rect x="9"  y="7"  width="5"  height="1" fill="#ffffff"/>
  <rect x="8"  y="8"  width="6"  height="1" fill="#ffffff"/>
  <rect x="8"  y="9"  width="6"  height="1" fill="#ffffff"/>
  <rect x="7"  y="10" width="7"  height="1" fill="#ffffff"/>
  <rect x="7"  y="11" width="7"  height="1" fill="#ffffff"/>
  <rect x="7"  y="12" width="7"  height="1" fill="#ffffff"/>
  <rect x="7"  y="13" width="7"  height="1" fill="#ffffff"/>
  <rect x="8"  y="14" width="6"  height="1" fill="#ffffff"/>
  <rect x="8"  y="15" width="6"  height="1" fill="#ffffff"/>
  <rect x="9"  y="16" width="5"  height="1" fill="#ffffff"/>

  <!-- Eye -->
  <rect x="12" y="6"  width="1"  height="1" fill="#000000"/>

  <!-- Beak — orange triangle, slight up-right angle -->
  <rect x="14" y="6"  width="1"  height="1" fill="#000000"/>
  <rect x="14" y="7"  width="3"  height="1" fill="#ff7a18"/>
  <rect x="14" y="8"  width="2"  height="1" fill="#ff7a18"/>
  <rect x="17" y="7"  width="1"  height="1" fill="#000000"/>
  <rect x="16" y="8"  width="1"  height="1" fill="#000000"/>

  <!-- Feet — two small orange ovals at bottom -->
  <rect x="7"  y="18" width="3"  height="1" fill="#ff7a18"/>
  <rect x="11" y="18" width="3"  height="1" fill="#ff7a18"/>
  <rect x="7"  y="18" width="1"  height="1" fill="#000000"/>
  <rect x="9"  y="18" width="1"  height="1" fill="#000000"/>
  <rect x="11" y="18" width="1"  height="1" fill="#000000"/>
  <rect x="13" y="18" width="1"  height="1" fill="#000000"/>
</svg>
