<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3DS 3D Media Studio — 3D動画/写真プレイヤー&コンバーター</title>
<meta name="description" content="ニンテンドー3DSで撮影した3D動画(.AVI)と3D写真(.MPO)をブラウザで再生・変換・編集">
<link rel="stylesheet" href="style.css?v=win95-2">

<!-- Google Analytics 4 (placeholder ID — replace G-XXXXXXXXXX with your real ID) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-XXXXXXXXXX', { send_page_view: true });
</script>
</head>
<body>
<div class="app-window">
<header class="topbar">
  <div class="brand">
    <svg class="logo" viewBox="0 0 24 24" aria-hidden="true">
      <rect x="3" y="2" width="18" height="9" fill="none" stroke="currentColor" stroke-width="1.6"/>
      <rect x="5.5" y="4" width="13" height="5" fill="currentColor" opacity="0.55"/>
      <line x1="3" y1="11.5" x2="21" y2="11.5" stroke="currentColor" stroke-width="1.2" opacity="0.7"/>
      <rect x="3" y="13" width="18" height="9" fill="none" stroke="currentColor" stroke-width="1.6"/>
      <rect x="5.5" y="15" width="13" height="5" fill="currentColor" opacity="0.35"/>
      <circle cx="17.5" cy="20.5" r="0.6" fill="currentColor"/>
      <circle cx="19" cy="20.5" r="0.6" fill="currentColor"/>
    </svg>
    <h1>3DS 3D Media Studio</h1>
  </div>
</header>

<main class="layout">
  <div class="workspace" id="workspace">
    <!-- Left: Preview (top) + scrollable details (bottom) -->
    <div class="left-col" id="leftCol">
      <section class="preview-card">
        <div class="preview-stage">
          <canvas id="previewCanvas" width="480" height="240" aria-label="プレビュー"></canvas>
          <div id="previewEmpty" class="preview-empty">右のキューにファイルをドロップしてください</div>
        </div>
        <div class="preview-controls">
          <button id="playBtn" class="btn primary" disabled title="再生/一時停止 (Space)">▶</button>
          <input id="seekBar" class="seek" type="range" min="0" max="1000" value="0" disabled>
          <span id="timeLabel" class="time">0:00 / 0:00</span>
        </div>
        <div class="preview-toolbar">
          <fieldset class="opt-group">
            <legend>表示</legend>
            <label class="opt"><input type="radio" name="viewMode" value="2d" checked> 2D</label>
            <label class="opt"><input type="radio" name="viewMode" value="sbs"> SBS</label>
          </fieldset>
          <fieldset class="opt-group">
            <legend>回転</legend>
            <label class="opt"><input type="radio" name="rotate" value="0" checked> 0°</label>
            <label class="opt"><input type="radio" name="rotate" value="90"> 90°</label>
            <label class="opt"><input type="radio" name="rotate" value="180"> 180°</label>
            <label class="opt"><input type="radio" name="rotate" value="270"> 270°</label>
          </fieldset>
          <fieldset class="opt-group">
            <legend>反転</legend>
            <label class="opt"><input type="checkbox" id="flipH"> 水平</label>
            <label class="opt"><input type="checkbox" id="flipV"> 垂直</label>
            <label class="opt"><input type="checkbox" id="swapLR"> 左右入替</label>
          </fieldset>
        </div>
        <div class="preview-adjust">
          <label class="slider"><span>明度</span><input type="range" id="brightness" min="-100" max="100" value="0"><output>0</output></label>
          <label class="slider"><span>コントラスト</span><input type="range" id="contrast" min="-100" max="100" value="0"><output>0</output></label>
          <label class="slider"><span>彩度</span><input type="range" id="saturation" min="-100" max="100" value="0"><output>0</output></label>
          <label class="slider"><span>ガンマ</span><input type="range" id="gamma" min="50" max="200" value="100"><output>1.00</output></label>
          <label class="slider"><span>色相</span><input type="range" id="hue" min="-180" max="180" value="0"><output>0°</output></label>
          <button id="resetColor" type="button" class="btn mini" title="色調整リセット">↺</button>
        </div>
      </section>

      <div class="splitter splitter-h" id="splitterH" role="separator" aria-orientation="horizontal" title="ドラッグで高さ変更"></div>

      <!-- Scrollable bottom: unified file info + EXIF, vertically stacked -->
      <div class="bottom-scroll">
        <div id="fileHeader" class="file-header">
          <div class="fh-name-row">
            <span class="fh-name" id="fhName">ファイル未選択</span>
            <button id="restoreAllBtn" class="btn mini ghost" type="button" disabled title="この項目の編集をすべて元に戻す">↺ 元に戻す</button>
          </div>
          <div class="fh-date" id="fhDate"></div>
          <dl id="infoList" class="info-list" aria-live="polite"></dl>
        </div>
      </div><!-- /.bottom-scroll -->
    </div>

    <div class="splitter splitter-v" id="splitterV" role="separator" aria-orientation="vertical" title="ドラッグで幅変更"></div>

    <!-- Right: Queue (also acts as drop target) -->
    <section id="queueSection" class="queue-section">
      <div class="queue-head">
        <h2 class="section-title">変換キュー</h2>
        <div class="queue-actions">
          <button id="runQueueBtn" class="btn primary" type="button" disabled>▶ 変換</button>
          <button id="clearQueueBtn" class="btn ghost" type="button" disabled>クリア</button>
        </div>
      </div>

      <!-- Common settings — apply to entire queue -->
      <div class="common-settings">
        <div class="field">
          <label>出力フォーマット(動画)</label>
          <select id="outputFormatVideo" class="kind-row">
            <option value="mp4-2d-l">MP4 — 2D 左目</option>
            <option value="mp4-2d-r">MP4 — 2D 右目</option>
            <option value="mp4-sbs" selected>MP4 — SBS (横並び)</option>
            <option value="mp4-tab">MP4 — Top/Bottom (上下)</option>
            <option value="mp4-anaglyph">MP4 — アナグリフ赤青</option>
          </select>
        </div>
        <div class="field">
          <label>出力フォーマット(画像)</label>
          <select id="outputFormatImage" class="kind-row">
            <option value="jpg-2d-l">JPEG — 2D 左目</option>
            <option value="jpg-2d-r">JPEG — 2D 右目</option>
            <option value="jpg-sbs" selected>JPEG — SBS (横並び)</option>
            <option value="jpg-tab">JPEG — Top/Bottom</option>
            <option value="jpg-anaglyph">JPEG — アナグリフ</option>
            <option value="mpo">MPO — 再パック</option>
          </select>
        </div>
        <label class="slider"><span>JPEG品質</span><input type="range" id="jpegQuality" min="50" max="100" value="92"><output>92</output></label>
        <label class="slider"><span>動画Mbps</span><input type="range" id="videoBitrate" min="2" max="20" value="8"><output>8</output></label>
      </div>

      <ul id="queueList" class="queue-list" aria-live="polite">
        <li class="queue-empty">
          <div class="dz-icon">⤓</div>
          <div class="dz-title">.AVI / .MPO をここにドロップ</div>
          <div class="dz-sub">複数同時可</div>
          <div class="empty-actions">
            <label class="btn primary">
              ファイルを選択
              <input id="fileInput" type="file" accept=".avi,.mpo,video/avi,video/x-msvideo,image/jpeg" multiple hidden>
            </label>
            <button id="loadSampleBtn" class="btn" type="button">サンプル</button>
          </div>
        </li>
      </ul>
    </section>
  </div>
</main>

</div><!-- /.app-window -->

<!-- Single-field edit dialog -->
<dialog id="fieldEditDialog" class="modal modal-small">
  <form method="dialog" class="modal-inner">
    <h2 id="fieldEditTitle">編集</h2>
    <div id="fieldEditBody" class="field-edit-body"></div>
    <menu class="modal-actions">
      <button value="cancel">キャンセル</button>
      <button id="fieldEditSaveBtn" value="save" class="btn primary">保存</button>
    </menu>
  </form>
</dialog>

<script type="module" src="js/app.js?v=20"></script>
</body>
</html>
