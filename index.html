<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3DS 3D Media Studio — 3D動画/写真プレイヤー&コンバーター</title>
<meta name="description" content="ニンテンドー3DSで撮影した3D動画(.AVI)と3D写真(.MPO)をブラウザで再生・変換・編集">
<link rel="stylesheet" href="style.css?v=lay5">

<!-- Google Analytics 4 (placeholder ID — replace G-XXXXXXXXXX with your real ID) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-XXXXXXXXXX', { send_page_view: true });
</script>
</head>
<body>

<!-- Desktop area: holds all floating windows -->
<div class="desktop" id="desktop">

  <!-- Window: 再生 -->
  <section class="win" data-win="playback" aria-label="再生ウィンドウ">
    <header class="win-titlebar">
      <img class="win-icon" src="assets/icons/playback.svg" alt="">
      <span class="win-title">再生</span>
      <div class="win-controls">
        <button class="win-btn" data-act="min" title="最小化" tabindex="-1"><img src="assets/icons/win-min.svg" alt="_"></button>
        <button class="win-btn" data-act="max" title="最大化" tabindex="-1"><img src="assets/icons/win-max.svg" alt="□"></button>
        <button class="win-btn" data-act="close" title="閉じる" tabindex="-1"><img src="assets/icons/win-close.svg" alt="×"></button>
      </div>
    </header>
    <div class="win-body win-body-flex">
      <div class="preview-stage">
        <canvas id="previewCanvas" width="480" height="240" aria-label="プレビュー"></canvas>
        <div id="previewEmpty" class="preview-empty">キューウィンドウからファイルを選択してください</div>
      </div>
      <div class="preview-controls">
        <button id="playBtn" class="btn primary" disabled title="再生/一時停止 (Space)"><img class="play-icon" src="assets/icons/play.svg" alt="▶"></button>
        <input id="seekBar" class="seek" type="range" min="0" max="1000" value="0" disabled>
        <span id="timeLabel" class="time">0:00 / 0:00</span>
      </div>
    </div>
  </section>

  <!-- Window: 編集 -->
  <section class="win" data-win="edit" aria-label="編集ウィンドウ">
    <header class="win-titlebar">
      <img class="win-icon" src="assets/icons/edit.svg" alt="">
      <span class="win-title">編集</span>
      <div class="win-controls">
        <button class="win-btn" data-act="min" title="最小化" tabindex="-1"><img src="assets/icons/win-min.svg" alt="_"></button>
        <button class="win-btn" data-act="max" title="最大化" tabindex="-1"><img src="assets/icons/win-max.svg" alt="□"></button>
        <button class="win-btn" data-act="close" title="閉じる" tabindex="-1"><img src="assets/icons/win-close.svg" alt="×"></button>
      </div>
    </header>
    <div class="win-body">
      <fieldset class="opt-group">
        <legend>表示</legend>
        <label class="opt"><input type="radio" name="viewMode" value="2d"> 2D</label>
        <label class="opt"><input type="radio" name="viewMode" value="sbs" checked> サイドバイサイド</label>
      </fieldset>
      <fieldset class="opt-group">
        <legend>回転</legend>
        <label class="opt"><input type="radio" name="rotate" value="0" checked> 0°</label>
        <label class="opt"><input type="radio" name="rotate" value="90"> 90°</label>
        <label class="opt"><input type="radio" name="rotate" value="180"> 180°</label>
        <label class="opt"><input type="radio" name="rotate" value="270"> 270°</label>
      </fieldset>
      <fieldset class="opt-group">
        <legend>反転</legend>
        <label class="opt"><input type="checkbox" id="flipH"> 水平</label>
        <label class="opt"><input type="checkbox" id="flipV"> 垂直</label>
        <label class="opt"><input type="checkbox" id="swapLR"> 左右入替</label>
      </fieldset>
      <fieldset class="opt-group">
        <legend>色調整</legend>
        <label class="slider"><span>明度</span><input type="range" id="brightness" min="-100" max="100" value="0"><output>0</output></label>
        <label class="slider"><span>コントラスト</span><input type="range" id="contrast" min="-100" max="100" value="0"><output>0</output></label>
        <label class="slider"><span>彩度</span><input type="range" id="saturation" min="-100" max="100" value="0"><output>0</output></label>
        <label class="slider"><span>ガンマ</span><input type="range" id="gamma" min="50" max="200" value="100"><output>1.00</output></label>
        <label class="slider"><span>色相</span><input type="range" id="hue" min="-180" max="180" value="0"><output>0°</output></label>
      </fieldset>
    </div>
  </section>

  <!-- Window: 詳細 -->
  <section class="win" data-win="info" aria-label="詳細ウィンドウ">
    <header class="win-titlebar">
      <img class="win-icon" src="assets/icons/info.svg" alt="">
      <span class="win-title">詳細</span>
      <div class="win-controls">
        <button class="win-btn" data-act="min" title="最小化" tabindex="-1"><img src="assets/icons/win-min.svg" alt="_"></button>
        <button class="win-btn" data-act="max" title="最大化" tabindex="-1"><img src="assets/icons/win-max.svg" alt="□"></button>
        <button class="win-btn" data-act="close" title="閉じる" tabindex="-1"><img src="assets/icons/win-close.svg" alt="×"></button>
      </div>
    </header>
    <div class="win-body">
      <div id="fileHeader" class="file-header">
        <div class="fh-name-row">
          <span class="fh-name" id="fhName">ファイル未選択</span>
        </div>
        <div class="fh-date" id="fhDate"></div>
        <dl id="infoList" class="info-list" aria-live="polite"></dl>
      </div>
    </div>
  </section>

  <!-- Window: キュー -->
  <section class="win" data-win="queue" aria-label="キューウィンドウ" id="queueWin">
    <header class="win-titlebar">
      <img class="win-icon" src="assets/icons/queue.svg" alt="">
      <span class="win-title">キュー</span>
      <div class="win-controls">
        <button class="win-btn" data-act="min" title="最小化" tabindex="-1"><img src="assets/icons/win-min.svg" alt="_"></button>
        <button class="win-btn" data-act="max" title="最大化" tabindex="-1"><img src="assets/icons/win-max.svg" alt="□"></button>
        <button class="win-btn" data-act="close" title="閉じる" tabindex="-1"><img src="assets/icons/win-close.svg" alt="×"></button>
      </div>
    </header>
    <div class="win-body win-body-flex" id="queueSection">
      <div class="queue-head">
        <h2 class="section-title">変換キュー</h2>
        <div class="queue-actions">
          <button id="runQueueBtn" class="btn primary" type="button" disabled>▶ 変換</button>
          <button id="clearQueueBtn" class="btn ghost" type="button" disabled>クリア</button>
        </div>
      </div>

      <div class="common-settings">
        <div class="field">
          <label>出力フォーマット(動画)</label>
          <select id="outputFormatVideo">
            <option value="mp4-2d-l">MP4 — 2D 左目</option>
            <option value="mp4-2d-r">MP4 — 2D 右目</option>
            <option value="mp4-sbs" selected>MP4 — サイドバイサイド</option>
            <option value="mp4-tab">MP4 — Top/Bottom (上下)</option>
            <option value="mp4-anaglyph">MP4 — アナグリフ赤青</option>
          </select>
        </div>
        <div class="field">
          <label>出力フォーマット(画像)</label>
          <select id="outputFormatImage">
            <option value="jpg-2d-l">JPEG — 2D 左目</option>
            <option value="jpg-2d-r">JPEG — 2D 右目</option>
            <option value="jpg-sbs" selected>JPEG — サイドバイサイド</option>
            <option value="jpg-tab">JPEG — Top/Bottom</option>
            <option value="jpg-anaglyph">JPEG — アナグリフ</option>
            <option value="mpo">MPO — 再パック</option>
          </select>
        </div>
        <label class="slider"><span>JPEG品質</span><input type="range" id="jpegQuality" min="50" max="100" value="92"><output>92</output></label>
        <label class="slider"><span>動画Mbps</span><input type="range" id="videoBitrate" min="2" max="20" value="8"><output>8</output></label>
      </div>

      <ul id="queueList" class="queue-list" aria-live="polite">
        <li class="queue-empty">
          <img class="dz-icon" src="assets/icons/download.svg" alt="">
          <div class="dz-title">.AVI / .MPO をここにドロップ</div>
          <div class="dz-sub">複数同時可</div>
          <div class="empty-actions">
            <label class="btn primary">
              ファイルを選択
              <input id="fileInput" type="file" accept=".avi,.mpo,video/avi,video/x-msvideo,image/jpeg" multiple hidden>
            </label>
            <button id="loadSampleBtn" class="btn" type="button">サンプル</button>
          </div>
        </li>
      </ul>
    </div>
  </section>

</div><!-- /.desktop -->

<!-- Taskbar -->
<footer class="taskbar" id="taskbar">
  <button class="start-btn" id="startBtn" type="button">
    <img class="start-logo" src="assets/icons/start.svg" alt="">
    <span class="start-text">スタート</span>
  </button>
  <div class="taskbar-divider"></div>
  <div class="taskbar-items" id="taskbarItems">
    <button class="task-item" data-show="playback"><img class="task-icon" src="assets/icons/playback.svg" alt=""> 再生</button>
    <button class="task-item" data-show="edit"><img class="task-icon" src="assets/icons/edit.svg" alt=""> 編集</button>
    <button class="task-item" data-show="info"><img class="task-icon" src="assets/icons/info.svg" alt=""> 詳細</button>
    <button class="task-item" data-show="queue"><img class="task-icon" src="assets/icons/queue.svg" alt=""> キュー</button>
  </div>
  <div class="taskbar-tray">
    <span class="tray-clock" id="trayClock">--:--</span>
  </div>
</footer>

<!-- First-visit tutorial: dolphin assistant with speech bubble -->
<div id="tutorial" class="tutorial" hidden aria-live="polite">
  <div class="tutorial-bubble">
    <div class="tutorial-text" id="tutorialText"></div>
    <div class="tutorial-actions">
      <span class="tutorial-step" id="tutorialStep"></span>
      <button class="btn mini" id="tutorialPrev" type="button">戻る</button>
      <button class="btn mini" id="tutorialNext" type="button">次へ</button>
      <button class="btn mini" id="tutorialSkip" type="button">スキップ</button>
    </div>
  </div>
  <img class="tutorial-dolphin" src="assets/icons/dolphin.svg" alt="">
</div>

<!-- Single-field edit dialog -->
<dialog id="fieldEditDialog" class="modal modal-small">
  <form method="dialog" class="modal-inner">
    <h2 id="fieldEditTitle">編集</h2>
    <div id="fieldEditBody" class="field-edit-body"></div>
    <menu class="modal-actions">
      <button value="cancel">キャンセル</button>
      <button id="fieldEditSaveBtn" value="save" class="btn primary">保存</button>
    </menu>
  </form>
</dialog>

<script type="module" src="js/app.js?v=mdi"></script>
</body>
</html>
